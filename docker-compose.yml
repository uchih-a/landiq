services:
  postgres:
    image: postgres:16-alpine
    container_name: landiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: landiq_db
      POSTGRES_USER: landiq_user
      POSTGRES_PASSWORD: devpassword
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landiq_user -d landiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: landiq_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://landiq_user:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/landiq_db
    volumes:
      - ./ml_models:/app/ml_models:ro
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: node:20-alpine
    container_name: landiq_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Points to nginx (port 80) so API calls go through the proxy
      VITE_API_URL: http://localhost/
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s   # npm install needs time — was 60s, not enough

  nginx:
    image: nginx:alpine
    container_name: landiq_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      # Removed frontend health condition — nginx should not block on slow npm install
      # frontend will be ready by the time a real user hits it
      frontend:
        condition: service_started

volumes:
  postgres_data: